<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0e11" />
      <stop offset="100%" stop-color="#060608" />
    </linearGradient>
    <!-- Accent Logo Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  <!-- Rounded rect background, matching premium dark theme -->
  <rect width="32" height="32" rx="8" fill="url(#bg-grad)"/>
  <!-- Optional subtle border to make it pop on dark tabs -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" stroke="#2563eb" stroke-opacity="0.15" stroke-width="1"/>
  
  <g transform="translate(4, 4)">
    <!-- Outer elegant D shape in brand accent gradient -->
    <path d="M4 4H12C16.9706 4 21 8.02944 21 13C21 17.9706 16.9706 22 12 22H4V4Z" stroke="url(#accent-grad)" stroke-width="2" stroke-linejoin="round" />
    <!-- Center pillar of scales in premium light gray -->
    <line x1="9.5" y1="9" x2="9.5" y2="18" stroke="#f3f4f6" stroke-width="2" stroke-linecap="round" />
    <line x1="7.5" y1="18" x2="11.5" y2="18" stroke="#f3f4f6" stroke-width="2" stroke-linecap="round" />
    <!-- Balance beam -->
    <line x1="5.5" y1="10.5" x2="13.5" y2="10.5" stroke="#f3f4f6" stroke-width="1.5" stroke-linecap="round" />
    <!-- Left scale pan -->
    <path d="M4.5 14C4.5 15.5 6.5 15.5 6.5 14" stroke="#f3f4f6" stroke-width="1.5" stroke-linecap="round" />
    <line x1="5.5" y1="10.5" x2="5.5" y2="14" stroke="#f3f4f6" stroke-width="1" />
    <!-- Right scale pan -->
    <path d="M12.5 14C12.5 15.5 14.5 15.5 14.5 14" stroke="#f3f4f6" stroke-width="1.5" stroke-linecap="round" />
    <line x1="13.5" y1="10.5" x2="13.5" y2="14" stroke="#f3f4f6" stroke-width="1" />
  </g>
</svg>
