<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded rect background, modern premium dark blue -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  <!-- The D-shape scale icon in the center -->
  <g transform="translate(4, 4)">
    <!-- Outer elegant D shape in sapphire blue/accent -->
    <path d="M4 4H12C16.9706 4 21 8.02944 21 13C21 17.9706 16.9706 22 12 22H4V4Z" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round" />
    <!-- Center pillar of scales in white -->
    <line x1="9.5" y1="9" x2="9.5" y2="18" stroke="#f1f5f9" stroke-width="2" stroke-linecap="round" />
    <line x1="7.5" y1="18" x2="11.5" y2="18" stroke="#f1f5f9" stroke-width="2" stroke-linecap="round" />
    <!-- Balance beam -->
    <line x1="5.5" y1="10.5" x2="13.5" y2="10.5" stroke="#f1f5f9" stroke-width="1.5" stroke-linecap="round" />
    <!-- Left scale pan -->
    <path d="M4.5 14C4.5 15.5 6.5 15.5 6.5 14" stroke="#f1f5f9" stroke-width="1.5" stroke-linecap="round" />
    <line x1="5.5" y1="10.5" x2="5.5" y2="14" stroke="#f1f5f9" stroke-width="1" />
    <!-- Right scale pan -->
    <path d="M12.5 14C12.5 15.5 14.5 15.5 14.5 14" stroke="#f1f5f9" stroke-width="1.5" stroke-linecap="round" />
    <line x1="13.5" y1="10.5" x2="13.5" y2="14" stroke="#f1f5f9" stroke-width="1" />
  </g>
</svg>
